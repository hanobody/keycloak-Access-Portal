apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-portal
  namespace: access-portal
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: access-portal
  template:
    metadata:
      labels:
        app: access-portal
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/access-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: access-portal-secret
          readinessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
