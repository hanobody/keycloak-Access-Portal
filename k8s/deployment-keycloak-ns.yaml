apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-portal
  namespace: keycloak
  labels:
    app: access-portal
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: access-portal
  template:
    metadata:
      labels:
        app: access-portal
    spec:
      containers:
        - name: web
          image: doctor8181/access-portal:imperva-v1-c35b37f
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: access-portal-secret
          env:
            - name: PORTAL_APPS_CONFIG_PATH
              value: /app/config/apps.runtime.json
            - name: PORTAL_TABS_CONFIG_PATH
              value: /app/config/tabs.runtime.json
          volumeMounts:
            - name: apps-config
              mountPath: /app/config/apps.runtime.json
              subPath: apps.runtime.json
            - name: apps-config
              mountPath: /app/config/tabs.runtime.json
              subPath: tabs.runtime.json
          readinessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: apps-config
          configMap:
            name: access-portal-apps
